<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mission Élection — Jeu des 7 Familles</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #F5F0E8;
    --text: #1A1A1A;
    --muted: #8C8279;
    --accent: #3F2D60;
    --rose: #C2185B;
    --rouge: #D32F2F;
    --vert: #388E3C;
    --social: #E91E63;
    --orange: #F57C00;
    --violet: #7B1FA2;
    --bleu: #1976D2;
    --marine: #0D1B3E;
    --jaune: #FBC02D;
    --blanc: #F5F5F5;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #E8E2D5;
    font-family: 'Cormorant Garamond', Georgia, 'Times New Roman', serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 16px;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
  }

  /* === Family selector === */
  .family-nav {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    justify-content: center;
    margin-bottom: 20px;
    max-width: 700px;
  }
  .family-nav button {
    border: none;
    padding: 8px 14px;
    border-radius: 20px;
    font-family: 'Inter', sans-serif;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.03em;
    cursor: pointer;
    transition: all 0.2s;
    color: #fff;
    opacity: 0.5;
  }
  .family-nav button.active { opacity: 1; transform: scale(1.05); }

  /* === Card === */
  .card-container {
    position: relative;
    width: min(85vw, 370px);
    aspect-ratio: 63/88;
    margin: 0 auto 24px;
  }
  .card {
    width: 100%;
    height: 100%;
    border-radius: 14px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.18);
    overflow: hidden;
    display: flex;
    flex-direction: column;
    background: #fff;
    background-size: cover;
    background-position: center top;
    transition: transform 0.3s, opacity 0.3s;
  }
  .card.swipe-left { transform: translateX(-120%) rotate(-5deg); opacity: 0; }
  .card.swipe-right { transform: translateX(120%) rotate(5deg); opacity: 0; }

  /* Card header */
  .card-header {
    text-align: center;
    padding: 12px 20px 10px;
    flex: 0 0 auto;
    color: #fff;
  }
  .card-header .family-label {
    font-family: 'Inter', sans-serif;
    font-size: 9px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    opacity: 0.9;
    margin-bottom: 2px;
  }
  .card-header .family-name {
    font-family: 'Inter', sans-serif;
    font-size: 18px;
    font-weight: 900;
    letter-spacing: 0.01em;
    text-transform: uppercase;
  }

  /* Illustration */
  .card-illustration {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
  }
  .card-illustration .art-placeholder {
    font-size: 100px;
    opacity: 0.6;
  }
  .card-illustration .art-img {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center top;
  }
  .card-illustration .slogan {
    position: absolute;
    bottom: 12px;
    left: 16px;
    right: 16px;
    text-align: center;
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    font-weight: 700;
    font-style: normal;
    color: var(--text);
    background: rgba(255,255,255,0.85);
    padding: 6px 12px;
    border-radius: 8px;
  }

  /* Bottom bandeau - mirrors card-header exactly */
  .card-footer {
    text-align: center;
    padding: 12px 20px 10px;
    flex: 0 0 auto;
    color: #fff;
  }
  .card-footer .char-name {
    font-family: 'Inter', sans-serif;
    font-size: 18px;
    font-weight: 900;
    letter-spacing: 0.01em;
    text-transform: uppercase;
    margin-bottom: 2px;
  }
  .card-footer .char-subtitle {
    font-family: 'Inter', sans-serif;
    font-size: 9px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: none;
    opacity: 0.9;
  }

  /* Navigation */
  .nav-row {
    display: flex;
    align-items: center;
    gap: 16px;
    font-family: 'Inter', sans-serif;
  }
  .nav-row button {
    border: 1px solid rgba(0,0,0,0.12);
    background: #fff;
    border-radius: 8px;
    width: 44px;
    height: 44px;
    font-size: 16px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.15s;
    color: var(--text);
  }
  .nav-row button:active { background: rgba(0,0,0,0.06); }
  .nav-row .counter { font-family: 'Inter', sans-serif; font-size: 13px; color: var(--muted); min-width: 60px; text-align: center; }

  /* Responsive */
  @media (max-width: 500px) {
    .card-container { width: 82vw; }
    .family-nav button { font-size: 11px; padding: 6px 10px; }
  }
</style>
</head>
<body>

<!-- Family selector -->
<div class="family-nav" id="familyNav">
  <button data-idx="0" style="background:var(--rose)">La France<br>Ingérable</button>
  <button data-idx="1" style="background:#888">Écologiste</button>
  <button data-idx="2" style="background:#888">Social-<br>démocrate</button>
  <button data-idx="3" style="background:#888">Centre</button>
  <button data-idx="4" style="background:#888">Droite</button>
  <button data-idx="5" style="background:#888">Extrême<br>droite</button>
  <button data-idx="6" style="background:#888">Réac'</button>
</div>

<!-- Card -->
<div class="card-container" id="cardContainer">
  <div class="card" id="card">
    <div class="card-header" id="cardHeader">
      <div class="family-label">Mission Election</div>
      <div class="family-name" id="familyName">LA FRANCE INGÉRABLE</div>
    </div>
    <div class="card-illustration" id="cardIllustration">
      <img class="art-img" id="artImg" src="" alt="" style="display:none">
      <div class="art-placeholder" id="artPH">👴</div>
      <div class="slogan" id="cardSlogan"></div>
    </div>
    <div class="card-footer" id="cardFooter">
      <div class="char-name" id="charName">ALAIN SOUMIT</div>
      <div class="char-subtitle" id="charSubtitle">Le tribun cacochime</div>
    </div>
    <div id="cardName" style="display:none"></div>
  </div>
</div>

<!-- Navigation -->
<div class="nav-row">
  <button onclick="prevCard()">◀</button>
  <div class="counter" id="counter">1 / 6</div>
  <button onclick="nextCard()">▶</button>
</div>

<script>
// === DATA ===
const families = [
  {
    name: "LA FRANCE INGÉRABLE",
    initials: "LFI",
    color: "#C2185B",
    bg: "linear-gradient(135deg, #fce4ec 0%, #f8bbd0 100%)",
    members: [
      { name: "Alain Soumit", emoji: "👴", label: "grand-père", subtitle: "Le tribun cacochime", slogan: "L'insoumission, c'est non-négociable.", img: "alain-soumit.png" },
      { name: "Arlette Lagrève", emoji: "👵", label: "grand-mère", subtitle: "La paléo trotskiste", slogan: "50 ans de grève, et je remets ça.", img: "arlette-lagreve.png" },
      { name: "Mohamed Publik", emoji: "👨", label: "père", subtitle: "L'agitateur permanent", slogan: "On bloque tout, on partage tout !", img: "mohamed-publik-v3.png" },
      { name: "Mathilde Panot", emoji: "👩", label: "mère", subtitle: "La furie de l'Assemblée", slogan: "La 6ᵉ République, maintenant !", img: "mathilde-panot-hemicycle-v1.png" },
      { name: "Thomas Woke", emoji: "👦", label: "fils", subtitle: "Le déconstructeur", slogan: "Déconstruisez-vous, je suis déjà parfait." },
      { name: "Rima Kassos", emoji: "👧", label: "fille", subtitle: "La casseuse", slogan: "Cassez tout, on verra après." },
    ]
  },
  // Placeholder families (to be filled)
  ...Array(6).fill(null).map((_, i) => ({
    name: ["ÉCOLOGISTE", "SOCIAL-DÉMOCRATE", "CENTRE", "DROITE", "EXTRÊME DROITE", "RÉAC'"][i],
    initials: ["ECO", "SD", "CEN", "DRT", "ED", "REAC"][i],
    color: "#888",
    bg: "#eee",
    members: Array(6).fill(null).map((_, j) => ({
      name: `Personnage ${j+1}`,
      emoji: ["👴","👵","👨","👩","👦","👧"][j],
      label: ["grand-père","grand-mère","père","mère","fils","fille"][j],
      slogan: "Slogan à définir"
    }))
  }))
];

let currentFamily = 0;
let currentMember = 0;

// === RENDER ===
function render() {
  const fam = families[currentFamily];
  const mem = fam.members[currentMember];

  // Family nav
  document.querySelectorAll('#familyNav button').forEach((btn, i) => {
    btn.classList.toggle('active', i === currentFamily);
  });

  // Card background
  const card = document.getElementById('card');
  const illust = document.getElementById('cardIllustration');
  const artImg = document.getElementById('artImg');
  const artPH = document.getElementById('artPH');
  if (mem.img) {
    card.style.backgroundImage = `url(${mem.img})`;
    illust.style.backgroundImage = '';
    artImg.style.display = 'none';
    artPH.style.display = 'none';
  } else {
    card.style.backgroundImage = '';
    illust.style.backgroundImage = '';
    artImg.style.display = 'none';
    artPH.style.display = '';
    artPH.textContent = mem.emoji;
  }

  // Header (opaque — image covers full card underneath)
  const header = document.getElementById('cardHeader');
  header.style.background = fam.color;
  document.getElementById('familyName').textContent = fam.name;
  const slogan = document.getElementById('cardSlogan');
  slogan.textContent = '';
  slogan.style.display = 'none';

  // Name + subtitle (removed - uses card-footer instead)

  // Footer bandeau - character info
  const footer = document.getElementById('cardFooter');
  footer.style.background = fam.color;
  document.getElementById('charName').textContent = mem.name.toUpperCase();
  document.getElementById('charSubtitle').textContent = mem.subtitle || '';

  // Counter
  document.getElementById('counter').textContent = `${currentMember + 1} / 6`;
}

// === NAVIGATION ===
function nextCard() {
  const fam = families[currentFamily];
  if (currentMember < fam.members.length - 1) {
    currentMember++;
  } else {
    currentFamily = (currentFamily + 1) % families.length;
    currentMember = 0;
  }
  render();
}

function prevCard() {
  if (currentMember > 0) {
    currentMember--;
  } else {
    currentFamily = (currentFamily - 1 + families.length) % families.length;
    currentMember = families[currentFamily].members.length - 1;
  }
  render();
}

// Family nav clicks
document.getElementById('familyNav').addEventListener('click', (e) => {
  const btn = e.target.closest('button');
  if (!btn) return;
  currentFamily = parseInt(btn.dataset.idx);
  currentMember = 0;
  render();
});

// Swipe support
let touchStartX = 0;
document.getElementById('cardContainer').addEventListener('touchstart', (e) => {
  touchStartX = e.touches[0].clientX;
});
document.getElementById('cardContainer').addEventListener('touchend', (e) => {
  const diff = e.changedTouches[0].clientX - touchStartX;
  if (diff < -50) nextCard();
  if (diff > 50) prevCard();
});

// Init
render();
</script>

</body>
</html>
