<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Jeu des 7 familles — Maquette</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #2a2a2a; display: flex; justify-content: center; align-items: center; min-height: 100vh; font-family: 'Georgia', serif; }
  
  .card {
    width: 2016px;
    height: 2816px;
    background: #fff;
    border-radius: 48px;
    box-shadow: 0 24px 96px rgba(0,0,0,0.3);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  
  /* Top bandeau */
  .card-header {
    background: #C2185B;
    color: #fff;
    text-align: center;
    padding: 75px 85px 54px;
    flex-shrink: 0;
  }
  .card-header .family {
    font-size: 32px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    opacity: 0.85;
  }
  .card-header .party {
    font-size: 96px;
    font-weight: bold;
    letter-spacing: 0.05em;
    margin-top: 10px;
  }
  
  /* Illustration area */
  .card-illustration {
    flex: 1;
    background: linear-gradient(135deg, #fce4ec 0%, #f8bbd0 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    border-bottom: 6px solid #C2185B;
  }
  .card-illustration .placeholder {
    text-align: center;
    color: #C2185B;
    opacity: 0.5;
    font-size: 48px;
    font-style: italic;
  }
  .card-illustration .slogan {
    position: absolute;
    bottom: 40px;
    left: 60px;
    right: 60px;
    text-align: center;
    font-size: 42px;
    font-style: italic;
    color: #C2185B;
    background: rgba(255,255,255,0.75);
    padding: 16px 24px;
    border-radius: 12px;
    font-weight: bold;
  }
  
  /* Name + role */
  .card-name {
    text-align: center;
    padding: 54px 85px 32px;
    flex-shrink: 0;
  }
  .card-name .name {
    font-size: 96px;
    font-weight: bold;
    color: #1a1a1a;
  }
  .card-name .role {
    font-size: 56px;
    color: #C2185B;
    font-style: italic;
    margin-top: 8px;
  }
  
  /* Silhouettes bar */
  .card-members {
    display: flex;
    justify-content: space-evenly;
    align-items: center;
    padding: 32px 64px 48px;
    border-top: 3px solid #eee;
    flex-shrink: 0;
    gap: 8px;
  }
  .member {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    font-size: 28px;
    color: #999;
  }
  .member .silhouette {
    width: 160px;
    height: 200px;
    border-radius: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 80px;
  }
  .member.active .silhouette {
    background: #C2185B;
    color: #fff;
  }
  .member.inactive .silhouette {
    background: #eee;
    color: #ccc;
  }
  .member.active span {
    color: #C2185B;
    font-weight: bold;
  }
</style>
</head>
<body>

<div class="card">
  <!-- Bandeau -->
  <div class="card-header">
    <div class="family">Jeu des 7 familles</div>
    <div class="party">EXTRÊME GAUCHE</div>
  </div>
  
  <!-- Illustration -->
  <div class="card-illustration">
    <div class="placeholder">
      <span style="font-size:256px;display:block;margin-bottom:28px">👴</span>
      Illustration<br>Alain Soumit
    </div>
    <div class="slogan">« L'insoumission, c'est non-négociable. »</div>
  </div>
  
  <!-- Nom -->
  <div class="card-name">
    <div class="name">Alain Soumit</div>
  </div>
  
  <!-- Silhouettes -->
  <div class="card-members">
    <div class="member active">
      <div class="silhouette">👴</div>
      <span>grand-père</span>
    </div>
    <div class="member inactive">
      <div class="silhouette">👵</div>
      <span>grand-mère</span>
    </div>
    <div class="member inactive">
      <div class="silhouette">👨</div>
      <span>père</span>
    </div>
    <div class="member inactive">
      <div class="silhouette">👩</div>
      <span>mère</span>
    </div>
    <div class="member inactive">
      <div class="silhouette">👦</div>
      <span>fils</span>
    </div>
    <div class="member inactive">
      <div class="silhouette">👧</div>
      <span>fille</span>
    </div>
  </div>
</div>

</body>
</html>
